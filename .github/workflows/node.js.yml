name: K6 Performance Testing

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:   
    - cron: '0 12 * * *'

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup K6
        uses: grafana/setup-k6-action@v1.2.1
      - name: Run local k6 test
        uses: grafana/run-k6-action@v1.4.0
        with:
          path: src/tests
